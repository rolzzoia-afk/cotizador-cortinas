<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net cdnjs.cloudflare.com unpkg.com; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; font-src 'self' fonts.gstatic.com cdn.jsdelivr.net data:; img-src 'self' data: blob:; connect-src 'self' https://izelewwgeamktnzkiwvl.supabase.co wss://izelewwgeamktnzkiwvl.supabase.co; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Rolzzo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #18181b;
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 16px;
            padding: 40px 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
        }
        .login-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .login-brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: #93c5fd;
            margin-bottom: 4px;
        }
        .login-sub {
            font-size: 0.82rem;
            color: #71717a;
            margin-bottom: 24px;
        }
        .login-input {
            display: block;
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            text-align: center;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 8px;
            color: #e4e4e7;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-input:focus { border-color: rgba(59,130,246,0.6); }
        .login-input::placeholder { color: #52525b; }
        .login-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            background: rgba(59,130,246,0.2);
            border: 1px solid rgba(59,130,246,0.45);
            border-radius: 8px;
            color: #93c5fd;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover { background: rgba(59,130,246,0.35); }
        .login-btn:disabled { opacity: 0.5; cursor: default; }
        .login-error {
            color: #ef4444;
            font-size: 0.82rem;
            margin-top: 14px;
            display: none;
        }
        .login-expired {
            background: rgba(234,179,8,0.1);
            border: 1px solid rgba(234,179,8,0.3);
            color: #fbbf24;
            font-size: 0.8rem;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 18px;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-brand">Cortinas Rolzzo</div>
    <div class="login-sub">Ingresá con tu cuenta para continuar</div>

    <div id="aviso-expirado" class="login-expired">
        Tu sesión expiró. Ingresá de nuevo para continuar.
    </div>

    <input type="email" id="login-email" class="login-input"
           placeholder="email@ejemplo.com" autocomplete="email">
    <input type="password" id="login-password" class="login-input"
           placeholder="Contraseña" autocomplete="current-password">
    <button id="btn-login" class="login-btn">Entrar</button>
    <p id="login-error" class="login-error"></p>
    <p style="margin-top:18px;font-size:0.82rem;">
        <a href="registro.html" style="color:#93c5fd;text-decoration:none;">¿No tenés cuenta? Registrate</a>
    </p>
</div>

<script>
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Destino después del login (default: index.html)
    const params = new URLSearchParams(window.location.search);
    const returnTo = params.get('returnTo') || 'index.html';

    // Si hay parámetro expired, mostrar aviso
    if (params.get('expired') === '1') {
        document.getElementById('aviso-expirado').style.display = 'block';
    }

    // Si ya hay sesión activa, ir directo al destino
    (async function () {
        try {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                window.location.replace(decodeURIComponent(returnTo));
                return;
            }
        } catch (e) { /* sin sesión, mostrar form */ }
    })();

    // Login
    async function loginConSupabase() {
        const email = (document.getElementById('login-email').value || '').trim();
        const pass  = document.getElementById('login-password').value;
        const errEl = document.getElementById('login-error');
        const btn   = document.getElementById('btn-login');

        if (!email || !pass) {
            errEl.textContent = 'Ingresá email y contraseña.';
            errEl.style.display = '';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Entrando...';
        errEl.style.display = 'none';

        try {
            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
            if (error) throw error;

            // Obtener tenant_id del perfil y guardarlo para acceso sincrónico
            const { data: perfil } = await sb.from('perfiles')
                .select('empresa_id')
                .eq('id', data.user.id)
                .maybeSingle();
            if (perfil?.empresa_id) {
                localStorage.setItem('rolzzo_tenant_id', perfil.empresa_id);
            }

            window.location.replace(decodeURIComponent(returnTo));
        } catch (e) {
            errEl.textContent = e.message === 'Invalid login credentials'
                ? 'Email o contraseña incorrectos.'
                : (e.message || 'Error al iniciar sesión.');
            errEl.style.display = '';
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    }

    // Enter para enviar
    document.getElementById('btn-login').addEventListener('click', loginConSupabase);
    document.getElementById('login-password').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') loginConSupabase();
    });
    document.getElementById('login-email').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') document.getElementById('login-password').focus();
    });
</script>

</body>
</html>
