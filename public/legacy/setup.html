<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net cdnjs.cloudflare.com unpkg.com; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; font-src 'self' fonts.gstatic.com cdn.jsdelivr.net data:; img-src 'self' data: blob:; connect-src 'self' https://izelewwgeamktnzkiwvl.supabase.co wss://izelewwgeamktnzkiwvl.supabase.co; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración inicial — Rolzzo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth-guard.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wizard {
            background: #18181b;
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 16px;
            padding: 36px 32px;
            max-width: 440px;
            width: 92%;
        }
        .wizard-header { text-align: center; margin-bottom: 24px; }
        .wizard-icon { font-size: 2rem; margin-bottom: 8px; }
        .wizard-titulo { font-size: 1.1rem; font-weight: 700; color: #93c5fd; }
        .wizard-sub { font-size: 0.8rem; color: #71717a; margin-top: 4px; }

        /* Indicador de pasos */
        .pasos { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
        .paso-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3);
            transition: all 0.3s;
        }
        .paso-dot.activo { background: #3b82f6; border-color: #3b82f6; transform: scale(1.2); }
        .paso-dot.completado { background: #4ade80; border-color: #4ade80; }

        /* Pantallas */
        .pantalla { display: none; }
        .pantalla.activa { display: block; }

        .label { font-size: 0.82rem; color: #a1a1aa; margin-bottom: 6px; display: block; text-align: left; }
        .campo {
            display: block; width: 100%; padding: 10px 14px; margin-bottom: 14px;
            font-size: 0.88rem; font-family: inherit; background: rgba(0,0,0,0.4);
            border: 1px solid rgba(59,130,246,0.22); border-radius: 8px;
            color: #e4e4e7; outline: none; transition: border-color 0.2s;
        }
        .campo:focus { border-color: rgba(59,130,246,0.6); }
        .campo::placeholder { color: #52525b; }

        .canal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
        .canal-chip {
            padding: 8px 10px; font-size: 0.8rem; font-family: inherit;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; color: #a1a1aa; cursor: pointer; text-align: center;
            transition: all 0.2s;
        }
        .canal-chip.selected {
            background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.5);
            color: #93c5fd; font-weight: 600;
        }

        .botones { display: flex; gap: 10px; margin-top: 20px; }
        .btn {
            flex: 1; padding: 10px; font-size: 0.9rem; font-weight: 600;
            font-family: inherit; border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary {
            background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.45); color: #93c5fd;
        }
        .btn-primary:hover { background: rgba(59,130,246,0.35); }
        .btn-secondary {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #71717a;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); }
        .btn-success {
            background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.4); color: #4ade80;
        }
        .btn-success:hover { background: rgba(74,222,128,0.25); }
        .btn:disabled { opacity: 0.5; cursor: default; }
    </style>
</head>
<body>

<div class="wizard">
    <div class="wizard-header">
        <div class="wizard-icon">⚙️</div>
        <div class="wizard-titulo">Configuración inicial</div>
        <div class="wizard-sub">Configurá lo básico para empezar a usar Rolzzo</div>
    </div>

    <div class="pasos">
        <div class="paso-dot activo" id="dot-1"></div>
        <div class="paso-dot" id="dot-2"></div>
        <div class="paso-dot" id="dot-3"></div>
    </div>

    <!-- ══ PASO 1: Equipo ══ -->
    <div class="pantalla activa" id="paso-1">
        <label class="label">Nombre del equipo o sucursal</label>
        <input type="text" id="setup-equipo" class="campo" placeholder="Ej: Taller Central, Sucursal Norte...">

        <label class="label">¿Cuántas personas van a usar el sistema?</label>
        <select id="setup-personas" class="campo" style="text-align:left;">
            <option value="1-3">1 a 3 personas</option>
            <option value="4-10">4 a 10 personas</option>
            <option value="10+">Más de 10</option>
        </select>

        <div class="botones">
            <button class="btn btn-primary" onclick="irPaso(2)">Siguiente</button>
        </div>
    </div>

    <!-- ══ PASO 2: Canales de venta ══ -->
    <div class="pantalla" id="paso-2">
        <label class="label">¿Qué canales de venta usás? (seleccioná los que apliquen)</label>
        <div class="canal-grid" id="canales-grid">
            <div class="canal-chip" data-canal="instagram" onclick="toggleCanal(this)">📸 Instagram</div>
            <div class="canal-chip" data-canal="facebook" onclick="toggleCanal(this)">📘 Facebook</div>
            <div class="canal-chip" data-canal="whatsapp" onclick="toggleCanal(this)">💬 WhatsApp</div>
            <div class="canal-chip" data-canal="local" onclick="toggleCanal(this)">🏪 Local físico</div>
            <div class="canal-chip" data-canal="web" onclick="toggleCanal(this)">🌐 Sitio web</div>
            <div class="canal-chip" data-canal="referidos" onclick="toggleCanal(this)">🤝 Referidos</div>
        </div>

        <div class="botones">
            <button class="btn btn-secondary" onclick="irPaso(1)">Atrás</button>
            <button class="btn btn-primary" onclick="irPaso(3)">Siguiente</button>
        </div>
    </div>

    <!-- ══ PASO 3: Metas ══ -->
    <div class="pantalla" id="paso-3">
        <label class="label">Meta mensual de cotizaciones</label>
        <input type="number" id="setup-meta-cotz" class="campo" placeholder="Ej: 50" min="0">

        <label class="label">Meta mensual de cierres (ventas)</label>
        <input type="number" id="setup-meta-cierres" class="campo" placeholder="Ej: 15" min="0">

        <div class="botones">
            <button class="btn btn-secondary" onclick="irPaso(2)">Atrás</button>
            <button id="btn-finalizar" class="btn btn-success" onclick="finalizar()">Empezar a usar Rolzzo</button>
        </div>
    </div>
</div>

<script>
    var _pasoActual = 1;

    function irPaso(n) {
        document.getElementById('paso-' + _pasoActual).classList.remove('activa');
        document.getElementById('paso-' + n).classList.add('activa');

        // Actualizar dots
        for (var i = 1; i <= 3; i++) {
            var dot = document.getElementById('dot-' + i);
            dot.classList.remove('activo', 'completado');
            if (i < n) dot.classList.add('completado');
            else if (i === n) dot.classList.add('activo');
        }
        _pasoActual = n;
    }

    function toggleCanal(el) {
        el.classList.toggle('selected');
    }

    async function finalizar() {
        var btn = document.getElementById('btn-finalizar');
        btn.disabled = true;
        btn.textContent = 'Guardando...';

        try {
            await window._authReady;

            var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            var empresaId = window.EMPRESA_ID;

            // Recopilar datos
            var equipo    = (document.getElementById('setup-equipo').value || '').trim() || 'Mi equipo';
            var personas  = document.getElementById('setup-personas').value;
            var canales   = Array.from(document.querySelectorAll('.canal-chip.selected'))
                                .map(function(el) { return el.dataset.canal; });
            var metaCotz    = parseInt(document.getElementById('setup-meta-cotz').value) || 30;
            var metaCierres = parseInt(document.getElementById('setup-meta-cierres').value) || 10;

            // Guardar config en Supabase (upsert múltiple)
            var configs = [
                { empresa_id: empresaId, clave: 'equipo_nombre',         valor: equipo },
                { empresa_id: empresaId, clave: 'equipo_tamano',         valor: personas },
                { empresa_id: empresaId, clave: 'canales_venta',         valor: JSON.stringify(canales) },
                { empresa_id: empresaId, clave: 'meta_cotizaciones',     valor: String(metaCotz) },
                { empresa_id: empresaId, clave: 'meta_cierres',          valor: String(metaCierres) },
                { empresa_id: empresaId, clave: 'onboarding_completado', valor: 'true' }
            ];

            for (var i = 0; i < configs.length; i++) {
                await sb.from('configuracion').upsert(configs[i], { onConflict: 'empresa_id,clave' });
            }

            // Ir a la app
            window.location.replace('index.html');

        } catch (e) {
            console.error('[setup] Error:', e);
            alert('Error guardando configuración: ' + (e.message || e));
            btn.disabled = false;
            btn.textContent = 'Empezar a usar Rolzzo';
        }
    }
</script>

</body>
</html>
