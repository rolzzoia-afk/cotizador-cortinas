name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Usamos 'npm install' en vez de 'npm ci' porque npm 10 no respeta
        # los constraints de `os`/`cpu` de deps opcionales (intenta instalar
        # @esbuild/netbsd-arm64 en linux). 'npm install' es más tolerante.
        # Flags: --no-audit (más rápido), --prefer-offline (usa caché primero).
        run: npm install --no-audit --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Placeholders — Vite los inlinea en el bundle. Si faltan,
          # el código compila pero tirará error al primer uso en runtime.
          # Para que CI valide la compilación, basta con cualquier string.
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
