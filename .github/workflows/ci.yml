name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm to v11
        # Node 22 trae npm 10.9 que no respeta constraints de `os` en deps
        # opcionales (intenta instalar @esbuild/netbsd-arm64 en linux).
        # npm 11 lo maneja bien.
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Placeholders — Vite los inlinea en el bundle. Si faltan,
          # el código compila pero tirará error al primer uso en runtime.
          # Para que CI valide la compilación, basta con cualquier string.
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
