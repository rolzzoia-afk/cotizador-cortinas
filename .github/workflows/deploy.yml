# =============================================================================
# ROLZZO · Deploy a Cloudflare Pages
# Se ejecuta automáticamente con cada push a la rama main.
#
# SETUP (una sola vez):
#   1. Ir a https://dash.cloudflare.com → Pages → Create a project → Connect to Git
#   2. Conectar este repositorio → Framework: None → Build command: (vacío)
#   3. En Cloudflare: Settings → API Tokens → crear token con permiso "Cloudflare Pages:Edit"
#   4. En GitHub repo → Settings → Secrets → Actions → agregar:
#        CF_API_TOKEN  = (el token de Cloudflare)
#        CF_ACCOUNT_ID = (tu Account ID de Cloudflare, está en el dashboard)
#   5. El nombre del proyecto en Cloudflare debe ser: cotizador-cortinas
# =============================================================================

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite ejecutar manualmente desde GitHub Actions

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Publicar en Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken:   ${{ secrets.CF_API_TOKEN }}
          accountId:  ${{ secrets.CF_ACCOUNT_ID }}
          projectName: cotizador-cortinas
          directory:   .          # publica todo el repo (los .html están en la raíz)
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
