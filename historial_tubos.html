<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Tubos — Rolzzo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        :root {
            --bg-primary:    #0A0A0B;
            --bg-card:       #1A1A1C;
            --border:        rgba(255,255,255,0.07);
            --border-mid:    rgba(255,255,255,0.12);
            --text-primary:  #FAFAF8;
            --text-secondary:#A8A8A6;
            --text-muted:    #6B6B69;
            --accent:        #7C75F0;
            --accent-dim:    rgba(124,117,240,0.15);
            --success:       #4ADE80;
            --warning:       #FBBF24;
            --danger:        #F87171;
            --info:          #60A5FA;
            --sans:          'Plus Jakarta Sans', system-ui, sans-serif;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:var(--sans); background:var(--bg-primary); color:var(--text-primary);
            min-height:100vh; -webkit-font-smoothing:antialiased; }

        /* Header */
        .app-header { padding:14px 20px; border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:10px; }
        .app-header h1 { font-size:1rem; font-weight:700; }
        .app-header .sub { font-size:0.75rem; color:var(--text-muted); }

        /* Tabs */
        .tabs-bar { display:flex; gap:4px; padding:12px 16px 0;
            border-bottom:1px solid var(--border); }
        .tab-btn { background:none; border:none; color:var(--text-muted);
            font-family:var(--sans); font-size:0.82rem; font-weight:600;
            padding:8px 14px; border-radius:8px 8px 0 0; cursor:pointer;
            transition:all .2s; border-bottom:2px solid transparent; }
        .tab-btn.active { color:var(--text-primary);
            border-bottom-color:var(--accent); background:var(--accent-dim); }

        /* Glass card */
        .glass-card { background:var(--bg-card); border:1px solid var(--border);
            border-radius:14px; margin:12px 16px; overflow:hidden; }
        .card-header-bar { display:flex; align-items:center; justify-content:space-between;
            padding:12px 16px; border-bottom:1px solid var(--border); }
        .card-header-bar h6 { font-size:0.82rem; font-weight:700; margin:0;
            display:flex; align-items:center; gap:6px; }
        .card-body-pad { padding:14px 16px; }

        /* Buscador */
        .search-wrap { padding:14px 16px; display:flex; gap:8px; }
        .search-input { flex:1; background:var(--bg-card); border:1px solid var(--border-mid);
            border-radius:10px; padding:9px 14px; color:var(--text-primary);
            font-family:var(--sans); font-size:0.85rem; outline:none; }
        .search-input:focus { border-color:var(--accent); }
        .btn-buscar { background:var(--accent); color:#fff; border:none; border-radius:10px;
            padding:9px 20px; font-family:var(--sans); font-size:0.85rem; font-weight:600;
            cursor:pointer; }

        /* Timeline */
        .timeline { padding:8px 0; }
        .tl-item { display:flex; gap:12px; padding:10px 16px; position:relative; }
        .tl-item:not(:last-child)::after {
            content:''; position:absolute; left:31px; top:36px; bottom:-10px;
            width:2px; background:var(--border); z-index:0; }
        .tl-dot { width:20px; height:20px; border-radius:50%; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            font-size:0.7rem; z-index:1; margin-top:3px; }
        .tl-content { flex:1; min-width:0; }
        .tl-evento { font-size:0.8rem; font-weight:700; }
        .tl-detail { font-size:0.73rem; color:var(--text-secondary); margin-top:2px; }
        .tl-fecha  { font-size:0.68rem; color:var(--text-muted); margin-top:2px; }
        .tl-notas  { font-size:0.7rem; color:var(--text-muted); margin-top:3px;
            font-style:italic; }

        /* Merma mensual */
        .merma-month { margin-bottom:16px; }
        .merma-month-header { font-size:0.78rem; font-weight:700;
            color:var(--text-secondary); padding:8px 0 6px;
            border-bottom:1px solid var(--border); margin-bottom:8px; }
        .merma-row { display:flex; align-items:center; gap:10px;
            padding:7px 0; border-bottom:1px solid var(--border); }
        .merma-cod { font-size:0.8rem; font-weight:700; min-width:80px; }
        .merma-bar-wrap { flex:1; background:rgba(255,255,255,0.05);
            border-radius:4px; height:8px; overflow:hidden; }
        .merma-bar { height:100%; border-radius:4px; background:#ef4444; }
        .merma-val { font-size:0.75rem; color:var(--text-secondary);
            min-width:80px; text-align:right; }

        /* Chips de evento */
        .ev-chip { display:inline-flex; align-items:center; gap:4px;
            font-size:0.68rem; font-weight:700; border-radius:6px;
            padding:2px 8px; text-transform:uppercase; letter-spacing:.04em; }

        /* Empty */
        .empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); }
        .empty-state i { font-size:2.5rem; display:block; margin-bottom:12px; }

        /* Spinner */
        .spin { width:20px; height:20px; border:2px solid var(--border-mid);
            border-top-color:var(--accent); border-radius:50%;
            animation:spin .7s linear infinite; display:inline-block; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Stats strip */
        .stats-strip { display:grid; grid-template-columns:repeat(3,1fr);
            gap:8px; padding:0 16px 8px; }
        .stat-box { background:var(--bg-card); border:1px solid var(--border);
            border-radius:10px; padding:10px 14px; }
        .stat-box .val { font-size:1.2rem; font-weight:800; }
        .stat-box .lbl { font-size:0.68rem; color:var(--text-muted);
            text-transform:uppercase; letter-spacing:.06em; }
    </style>
</head>
<body>

<div class="app-header">
    <i class="bi bi-rulers" style="color:var(--accent);font-size:1.2rem;"></i>
    <div>
        <div class="app-header h1">Historial de Tubos</div>
        <div class="sub">Trazabilidad · Merma mensual</div>
    </div>
</div>

<!-- Tabs -->
<div class="tabs-bar">
    <button class="tab-btn active" id="tab-historial" onclick="switchTab('historial')">
        <i class="bi bi-clock-history"></i> Historial por tubo
    </button>
    <button class="tab-btn" id="tab-merma" onclick="switchTab('merma')">
        <i class="bi bi-trash3"></i> Merma mensual
    </button>
</div>

<!-- ══ VISTA: HISTORIAL POR TUBO ══ -->
<div id="view-historial">
    <div class="search-wrap">
        <input id="buscar-cod"      class="search-input" type="text"
            placeholder="Código de tubo (ej: BK10, DU90…)"
            onkeydown="if(event.key==='Enter') buscarTubo()">
        <input id="buscar-colmena" class="search-input" type="text"
            placeholder="N° Colmena (ej: A1, B3…)"
            onkeydown="if(event.key==='Enter') buscarTubo()"
            style="max-width:140px;">
        <button class="btn-buscar" onclick="buscarTubo()">
            <i class="bi bi-search"></i> Buscar
        </button>
    </div>

    <div id="resultado-busqueda">
        <div class="empty-state">
            <i class="bi bi-rulers"></i>
            Ingresa el código o número de colmena de un tubo para ver su historial completo.
        </div>
    </div>
</div>

<!-- ══ VISTA: MERMA MENSUAL ══ -->
<div id="view-merma" style="display:none;">
    <div class="stats-strip" id="merma-stats" style="padding-top:14px;">
        <div class="stat-box">
            <div class="val" id="stat-total-cm">—</div>
            <div class="lbl">cm total merma</div>
        </div>
        <div class="stat-box">
            <div class="val" id="stat-total-m">—</div>
            <div class="lbl">metros merma</div>
        </div>
        <div class="stat-box">
            <div class="val" id="stat-total-eventos">—</div>
            <div class="lbl">eventos</div>
        </div>
    </div>

    <div class="glass-card">
        <div class="card-header-bar">
            <h6><i class="bi bi-bar-chart-fill" style="color:#ef4444;"></i> Merma por mes y código</h6>
        </div>
        <div class="card-body-pad">
            <div style="height:220px; position:relative;">
                <canvas id="mermaChart"></canvas>
            </div>
        </div>
    </div>

    <div id="merma-desglose" style="padding:0 16px 40px;"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// SUPABASE CONFIG
// ══════════════════════════════════════════════════════════════════
const SUPABASE_URL      = 'https://izelewwgeamktnzkiwvl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6ZWxld3dnZWFta3Ruemtpd3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTg3NDAsImV4cCI6MjA5MDUzNDc0MH0.86i0fBjj2721SiJhNLZ1Z2uKiLg8ydM0f3_pXr8opZw';
const EMPRESA_ID        = 'rolzzo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ══════════════════════════════════════════════════════════════════
// COLORES DE EVENTO
// ══════════════════════════════════════════════════════════════════
const EV = {
    ingreso:          { color:'#4ade80', bg:'rgba(74,222,128,0.15)', icon:'bi-box-arrow-in-down', label:'Ingreso' },
    corte:            { color:'#60a5fa', bg:'rgba(96,165,250,0.15)', icon:'bi-scissors',           label:'Corte' },
    sobrante:         { color:'#a78bfa', bg:'rgba(167,139,250,0.15)',icon:'bi-arrow-return-left',   label:'Sobrante' },
    merma:            { color:'#f87171', bg:'rgba(248,113,113,0.15)',icon:'bi-trash3',              label:'Merma' },
    error_reemplazo:  { color:'#fb923c', bg:'rgba(251,146,60,0.15)', icon:'bi-arrow-repeat',        label:'Reemplazo error' },
    sobrante_error:   { color:'#c084fc', bg:'rgba(192,132,252,0.15)',icon:'bi-arrow-return-left',   label:'Sobrante error' },
    ajuste:           { color:'#fbbf24', bg:'rgba(251,191,36,0.15)', icon:'bi-pencil',              label:'Ajuste admin' },
    eliminado:        { color:'#71717a', bg:'rgba(113,113,122,0.15)',icon:'bi-x-circle',            label:'Eliminado' }
};

// ══════════════════════════════════════════════════════════════════
// NAVEGACIÓN
// ══════════════════════════════════════════════════════════════════
function switchTab(tab) {
    document.getElementById('view-historial').style.display = tab === 'historial' ? '' : 'none';
    document.getElementById('view-merma').style.display     = tab === 'merma'     ? '' : 'none';
    document.getElementById('tab-historial').classList.toggle('active', tab === 'historial');
    document.getElementById('tab-merma').classList.toggle('active', tab === 'merma');
    if (tab === 'merma') cargarMerma();
}

// ══════════════════════════════════════════════════════════════════
// HISTORIAL POR TUBO
// ══════════════════════════════════════════════════════════════════
async function buscarTubo() {
    const cod     = document.getElementById('buscar-cod').value.trim().toUpperCase();
    const colmena = document.getElementById('buscar-colmena').value.trim().toUpperCase();
    const cont    = document.getElementById('resultado-busqueda');

    if (!cod && !colmena) {
        cont.innerHTML = `<div class="empty-state">
            <i class="bi bi-search"></i> Ingresa un código o número de colmena para buscar.</div>`;
        return;
    }

    cont.innerHTML = `<div class="empty-state"><span class="spin"></span></div>`;

    let query = sb.from('tubos_historial')
        .select('*')
        .eq('empresa_id', EMPRESA_ID)
        .order('created_at', { ascending: true })
        .limit(500);

    if (cod)     query = query.ilike('cod', `%${cod}%`);
    if (colmena) query = query.ilike('n_colmena', `%${colmena}%`);

    const { data, error } = await query;

    if (error) {
        cont.innerHTML = `<div class="empty-state"><i class="bi bi-exclamation-triangle"></i>
            Error: ${error.message}</div>`;
        return;
    }

    if (!data || !data.length) {
        cont.innerHTML = `<div class="empty-state">
            <i class="bi bi-rulers"></i>
            No se encontraron eventos para ese tubo.<br>
            <small style="font-size:0.75rem;margin-top:8px;display:block;">
                Recuerda que el historial solo registra eventos a partir de cuando se implementó esta función.
            </small></div>`;
        return;
    }

    // Agrupar por tubo_raiz_id para mostrar la cadena de vida
    const porRaiz = {};
    data.forEach(e => {
        const k = e.tubo_raiz_id || 'sin_raiz';
        if (!porRaiz[k]) porRaiz[k] = [];
        porRaiz[k].push(e);
    });

    const totalEventos = data.length;
    const codsMostrados = [...new Set(data.map(e => e.cod))].join(', ');

    let html = `
    <div style="padding:12px 16px 4px; font-size:0.75rem; color:var(--text-muted);">
        <strong style="color:var(--text-primary);">${totalEventos}</strong> eventos ·
        Código(s): <strong style="color:var(--accent);">${codsMostrados}</strong>
    </div>`;

    Object.entries(porRaiz).forEach(([raizId, eventos]) => {
        const primerEvento = eventos[0];
        const ultimoEvento = eventos[eventos.length - 1];
        const esLinaje = raizId !== 'sin_raiz';
        const tieneMerma = eventos.some(e => e.evento === 'merma');

        html += `
        <div class="glass-card">
            <div class="card-header-bar">
                <h6>
                    <i class="bi bi-link-45deg" style="color:var(--accent);"></i>
                    ${primerEvento.cod} · Colmena ${primerEvento.n_colmena}
                    ${tieneMerma ? '<span style="color:#f87171;font-size:0.7rem;margin-left:4px;">→ MERMA</span>' : ''}
                </h6>
                <span style="font-size:0.68rem;color:var(--text-muted);">
                    ${eventos.length} evento${eventos.length !== 1 ? 's' : ''}
                    ${esLinaje ? `<br><span title="${raizId}" style="font-family:monospace;font-size:0.6rem;">ID:${raizId.slice(0,8)}…</span>` : ''}
                </span>
            </div>
            <div class="timeline">
                ${eventos.map(e => renderEventoTL(e)).join('')}
            </div>
        </div>`;
    });

    cont.innerHTML = html;
}

function renderEventoTL(e) {
    const ev       = EV[e.evento] || { color:'#a1a1aa', bg:'rgba(161,161,170,0.15)', icon:'bi-circle', label:e.evento };
    const fecha    = e.created_at
        ? new Date(e.created_at).toLocaleString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
        : '—';
    const medida   = e.medida_cm != null ? `${Number(e.medida_cm).toFixed(1)} cm` : '—';
    const resultado= e.medida_resultado_cm != null ? `→ ${Number(e.medida_resultado_cm).toFixed(1)} cm` : '';

    return `
    <div class="tl-item">
        <div class="tl-dot" style="background:${ev.bg};color:${ev.color};">
            <i class="bi ${ev.icon}"></i>
        </div>
        <div class="tl-content">
            <div class="tl-evento">
                <span class="ev-chip" style="background:${ev.bg};color:${ev.color};">${ev.label}</span>
                &nbsp;<span style="font-weight:400;color:var(--text-secondary);font-size:0.78rem;">
                    ${medida} ${resultado}
                </span>
            </div>
            ${e.ot ? `<div class="tl-detail">OT: <strong>${e.ot}</strong> · Colmena: ${e.n_colmena || '—'}</div>` : `<div class="tl-detail">Colmena: ${e.n_colmena || '—'}</div>`}
            ${e.notas ? `<div class="tl-notas">${e.notas}</div>` : ''}
            <div class="tl-fecha">${fecha}${e.registrado_por ? ` · ${e.registrado_por}` : ''}</div>
        </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════════
// MERMA MENSUAL
// ══════════════════════════════════════════════════════════════════
let _mermaChart = null;

async function cargarMerma() {
    const desglose = document.getElementById('merma-desglose');
    desglose.innerHTML = `<div class="empty-state"><span class="spin"></span></div>`;

    const { data, error } = await sb
        .from('tubos_historial')
        .select('cod, medida_cm, evento, created_at, n_colmena, ot, notas')
        .eq('empresa_id', EMPRESA_ID)
        .eq('evento', 'merma')
        .order('created_at', { ascending: false })
        .limit(500);

    if (error || !data || !data.length) {
        document.getElementById('stat-total-cm').textContent  = '0';
        document.getElementById('stat-total-m').textContent   = '0';
        document.getElementById('stat-total-eventos').textContent = '0';
        desglose.innerHTML = `<div class="empty-state"><i class="bi bi-trash3"></i>
            No hay merma registrada aún.<br>
            <small style="font-size:0.75rem;margin-top:8px;display:block;">
                Se registrará automáticamente al guardar planes de corte desde el optimizador.
            </small></div>`;
        return;
    }

    // Stats globales
    const totalCm     = data.reduce((s, e) => s + (e.medida_cm || 0), 0);
    const totalM      = (totalCm / 100).toFixed(2);
    document.getElementById('stat-total-cm').textContent     = Math.round(totalCm).toLocaleString('es-AR');
    document.getElementById('stat-total-m').textContent      = totalM;
    document.getElementById('stat-total-eventos').textContent = data.length;

    // Agrupar por mes × cod
    const porMes = {}; // { '04/2026': { BK10: { total_cm, count, detalles: [] } } }
    data.forEach(e => {
        const mes = new Date(e.created_at).toLocaleDateString('es-AR', { month:'2-digit', year:'numeric' });
        if (!porMes[mes]) porMes[mes] = {};
        if (!porMes[mes][e.cod]) porMes[mes][e.cod] = { total_cm:0, count:0, detalles:[] };
        porMes[mes][e.cod].total_cm += e.medida_cm || 0;
        porMes[mes][e.cod].count++;
        porMes[mes][e.cod].detalles.push(e);
    });

    // Gráfico: barras por mes, apiladas por código
    const meses    = Object.keys(porMes).reverse(); // orden cronológico
    const codsTodos = [...new Set(data.map(e => e.cod))];
    const PALETA   = ['#ef4444','#f97316','#f59e0b','#3b82f6','#8b5cf6','#22c55e','#a1a1aa'];
    const datasets = codsTodos.map((cod, i) => ({
        label:           cod,
        data:            meses.map(m => Math.round((porMes[m]?.[cod]?.total_cm || 0) * 10) / 10),
        backgroundColor: PALETA[i % PALETA.length],
        borderRadius:    3,
        stack:           'merma'
    }));

    if (_mermaChart) _mermaChart.destroy();
    const ctx = document.getElementById('mermaChart').getContext('2d');
    _mermaChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: meses, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: true, position:'bottom',
                    labels: { color:'#a1a1aa', font:{ size:9 }, boxWidth:10, padding:8 }
                },
                tooltip: {
                    mode: 'index',
                    callbacks: {
                        label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} cm`,
                        footer: items => `Total: ${items.reduce((s,i)=>s+i.parsed.y,0).toFixed(1)} cm`
                    }
                }
            },
            scales: {
                x: { stacked:true, ticks:{ color:'#71717a', font:{size:10} }, grid:{ color:'rgba(255,255,255,0.04)' } },
                y: { stacked:true, ticks:{ color:'#71717a', stepSize:100 }, grid:{ color:'rgba(255,255,255,0.04)' }, beginAtZero:true,
                     title:{ display:true, text:'cm merma', color:'#6b6b69', font:{size:9} } }
            }
        }
    });

    // Desglose por mes
    let desgloseHTML = '';
    Object.entries(porMes).forEach(([mes, cods]) => {
        const totalMes = Object.values(cods).reduce((s, v) => s + v.total_cm, 0);
        const maxCm    = Math.max(...Object.values(cods).map(v => v.total_cm));

        desgloseHTML += `
        <div class="merma-month">
            <div class="merma-month-header">
                📅 ${mes} &mdash; total: <strong>${Math.round(totalMes).toLocaleString('es-AR')} cm</strong>
                (${(totalMes/100).toFixed(2)} m)
            </div>
            ${Object.entries(cods).sort((a,b)=>b[1].total_cm-a[1].total_cm).map(([cod, info]) => `
            <div class="merma-row">
                <div class="merma-cod">${cod}</div>
                <div class="merma-bar-wrap">
                    <div class="merma-bar" style="width:${Math.round(info.total_cm/maxCm*100)}%"></div>
                </div>
                <div class="merma-val">${Math.round(info.total_cm)} cm · ${info.count} corte${info.count!==1?'s':''}</div>
            </div>`).join('')}
            <!-- Detalle expandible -->
            <details style="margin-top:8px;">
                <summary style="font-size:0.72rem;color:var(--text-muted);cursor:pointer;padding:4px 0;">
                    Ver detalle de cada merma (${Object.values(cods).reduce((s,v)=>s+v.count,0)} eventos)
                </summary>
                <div style="margin-top:8px;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
                    <table style="width:100%;border-collapse:collapse;font-size:0.72rem;">
                        <thead>
                            <tr style="background:rgba(255,255,255,0.04);">
                                <th style="padding:6px 10px;text-align:left;color:var(--text-muted);">Código</th>
                                <th style="padding:6px 10px;text-align:left;color:var(--text-muted);">Colmena</th>
                                <th style="padding:6px 10px;text-align:right;color:var(--text-muted);">cm</th>
                                <th style="padding:6px 10px;text-align:left;color:var(--text-muted);">OT</th>
                                <th style="padding:6px 10px;text-align:left;color:var(--text-muted);">Fecha</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.values(cods).flatMap(info => info.detalles).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).map(e => `
                            <tr style="border-top:1px solid var(--border);">
                                <td style="padding:5px 10px;font-weight:700;">${e.cod}</td>
                                <td style="padding:5px 10px;color:var(--text-secondary);">${e.n_colmena || '—'}</td>
                                <td style="padding:5px 10px;text-align:right;color:#f87171;font-weight:600;">${(e.medida_cm||0).toFixed(1)}</td>
                                <td style="padding:5px 10px;color:var(--text-secondary);">${e.ot || '—'}</td>
                                <td style="padding:5px 10px;color:var(--text-muted);">
                                    ${new Date(e.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'})}
                                </td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </details>
        </div>`;
    });

    desglose.innerHTML = desgloseHTML || `<div class="empty-state"><i class="bi bi-trash3"></i> Sin datos.</div>`;
}
