<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Historial de Corte — Rolzzo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root {
    --bg-base:      #09090b;
    --bg-card:      #18181b;
    --bg-hover:     #27272a;
    --border-glass: rgba(255,255,255,0.07);
    --text-primary: #f4f4f5;
    --text-secondary:#a1a1aa;
    --primary-500:  #3b82f6;
    --accent:       #8b5cf6;
    --green:        #22c55e;
    --yellow:       #f59e0b;
    --red:          #ef4444;
    --orange:       #f97316;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-base); color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height:100vh; }

/* ── HEADER ── */
.app-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(9,9,11,0.95); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border-glass);
    padding: 12px 20px; display: flex; align-items: center; gap: 12px;
}
.app-header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }
.btn-back { background:none; border:none; color:var(--text-secondary); cursor:pointer;
    display:flex; align-items:center; gap:5px; font-size:0.9rem; }
.btn-back:hover { color:var(--text-primary); }

/* ── TABS ── */
.tabs-bar { display:flex; gap:6px; padding:14px 20px 0;
    border-bottom:1px solid var(--border-glass); background:var(--bg-base); }
.tab-btn { background:none; border:none; color:var(--text-secondary); padding:8px 16px;
    border-radius:8px 8px 0 0; font-size:0.88rem; font-weight:600; cursor:pointer;
    border-bottom:2px solid transparent; transition:all 0.15s; }
.tab-btn.active { color:var(--accent); border-color:var(--accent); background:rgba(139,92,246,0.08); }

/* ── VISTAS ── */
.view { display:none; padding:16px 20px; }
.view.active { display:block; }

/* ── PLAN CARDS ── */
.plan-card {
    background:var(--bg-card); border:1px solid var(--border-glass);
    border-radius:14px; margin-bottom:10px; overflow:hidden;
    transition:border-color 0.2s;
}
.plan-card-header {
    display:flex; align-items:center; gap:12px; padding:14px 16px;
    cursor:pointer; user-select:none;
}
.plan-card-header:hover { background:var(--bg-hover); }
.plan-fecha { font-size:0.95rem; font-weight:700; flex:1; }
.plan-meta { font-size:0.78rem; color:var(--text-secondary); }
.plan-chevron { color:var(--text-secondary); transition:transform 0.2s; font-size:1rem; }
.plan-card.expanded .plan-chevron { transform:rotate(180deg); }
.plan-card.has-errors { border-color:rgba(239,68,68,0.3); }
.plan-body { display:none; overflow-x:auto; }
.plan-card.expanded .plan-body { display:block; }

/* ── TABLA PLAN (igual al Excel) ── */
.tabla-plan { width:100%; border-collapse:collapse; font-size:0.78rem; min-width:900px; }
.tabla-plan th {
    background:rgba(255,255,255,0.05); color:var(--text-secondary);
    padding:8px 10px; text-align:left; font-size:0.7rem; font-weight:700;
    text-transform:uppercase; letter-spacing:0.05em; white-space:nowrap;
    border-bottom:1px solid var(--border-glass);
    position:sticky; top:0; z-index:2;
}
.tabla-plan td { padding:7px 10px; border-bottom:1px solid rgba(255,255,255,0.04);
    white-space:nowrap; vertical-align:middle; }
.tabla-plan tr:last-child td { border-bottom:none; }

/* Colores de filas — igual al Excel */
.fila-cortar td { background:transparent; }
.fila-cortar:hover td { background:rgba(255,255,255,0.03); }
.fila-mesa td { background:rgba(249,115,22,0.08); color:#fed7aa; }
.fila-merma td { background:rgba(239,68,68,0.08); color:#fca5a5; }
.fila-guardar td { background:rgba(59,130,246,0.08); color:#93c5fd; }
.fila-tira td { background:rgba(234,179,8,0.08); color:#fde68a; }

/* Tags de acción */
.tag-accion { display:inline-block; border-radius:5px; padding:2px 8px;
    font-size:0.68rem; font-weight:700; text-transform:uppercase; }
.tag-cortar  { background:rgba(139,92,246,0.2); color:#c4b5fd; }
.tag-mesa    { background:rgba(249,115,22,0.2); color:#fed7aa; }
.tag-merma   { background:rgba(239,68,68,0.2); color:#fca5a5; }
.tag-guardar { background:rgba(59,130,246,0.2); color:#93c5fd; }
.tag-tira    { background:rgba(234,179,8,0.2); color:#fde68a; }

/* Botón error por fila */
.btn-error-fila {
    background:none; border:1px solid rgba(239,68,68,0.3); color:var(--red);
    border-radius:6px; padding:3px 8px; font-size:0.72rem; cursor:pointer;
    transition:all 0.15s; white-space:nowrap;
}
.btn-error-fila:hover { background:rgba(239,68,68,0.15); }
.btn-error-fila.tiene-error { background:rgba(239,68,68,0.2); border-color:var(--red); font-weight:700; }

/* ── BADGE ERROR ── */
.badge-error { display:inline-flex; align-items:center; gap:4px;
    background:rgba(239,68,68,0.2); color:var(--red); border-radius:20px;
    padding:2px 10px; font-size:0.72rem; font-weight:700; }

/* ── MODAL ERROR ── */
.modal-overlay { position:fixed; inset:0; z-index:999;
    background:rgba(0,0,0,0.75); backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center; padding:16px; }
.modal-box {
    background:var(--bg-card); border:1px solid var(--border-glass);
    border-radius:18px; padding:24px; width:100%; max-width:560px;
    max-height:90vh; overflow-y:auto;
}
.modal-box h3 { font-size:1rem; font-weight:700; margin-bottom:4px; }
.modal-info-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; margin-top:10px; }
.info-chip { background:rgba(255,255,255,0.06); border-radius:8px;
    padding:5px 10px; font-size:0.78rem; }
.info-chip strong { color:var(--text-secondary); font-weight:600; display:block; font-size:0.68rem; }

.form-label-r { font-size:0.78rem; color:var(--text-secondary); margin-bottom:5px; display:block; }
.form-select-r, .form-input-r, .form-textarea-r {
    width:100%; background:#111113; color:var(--text-primary);
    border:1px solid var(--border-glass); border-radius:10px;
    padding:10px 12px; font-size:0.88rem; margin-bottom:14px;
}
.form-select-r:focus, .form-input-r:focus, .form-textarea-r:focus {
    outline:none; border-color:var(--accent); }
.form-textarea-r { resize:vertical; min-height:72px; }

.reemplazo-list { max-height:200px; overflow-y:auto;
    border:1px solid var(--border-glass); border-radius:10px;
    margin-bottom:14px; }
.reemplazo-item { padding:9px 12px; cursor:pointer; font-size:0.82rem;
    display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid var(--border-glass); transition:background 0.1s; }
.reemplazo-item:last-child { border-bottom:none; }
.reemplazo-item:hover { background:var(--bg-hover); }
.reemplazo-item.selected { background:rgba(139,92,246,0.15); border-color:var(--accent); }

.btn-confirm { background:var(--accent); color:#fff; border:none;
    border-radius:10px; padding:12px 20px; font-size:0.92rem; font-weight:700;
    width:100%; cursor:pointer; margin-top:4px; }
.btn-confirm:hover { opacity:0.85; }
.btn-cancel { background:none; border:1px solid var(--border-glass); color:var(--text-secondary);
    border-radius:10px; padding:10px 20px; font-size:0.88rem; width:100%;
    cursor:pointer; margin-top:8px; }

/* ── GRÁFICO ── */
.chart-card { background:var(--bg-card); border:1px solid var(--border-glass);
    border-radius:14px; padding:20px; margin-bottom:16px; }
.chart-card h3 { font-size:0.85rem; font-weight:700; color:var(--text-secondary);
    text-transform:uppercase; letter-spacing:0.08em; margin-bottom:16px; }

/* ── TABLA ERRORES ── */
.errores-table { width:100%; border-collapse:collapse; font-size:0.8rem; }
.errores-table th { background:rgba(255,255,255,0.04); color:var(--text-secondary);
    padding:8px 10px; text-align:left; font-size:0.7rem; font-weight:700;
    text-transform:uppercase; border-bottom:1px solid var(--border-glass); }
.errores-table td { padding:9px 10px; border-bottom:1px solid var(--border-glass); }
.errores-table tr:last-child td { border-bottom:none; }

.motivo-chip { display:inline-block; border-radius:6px; padding:2px 8px;
    font-size:0.7rem; font-weight:700; }
.mc-operario { background:rgba(239,68,68,0.15); color:var(--red); }
.mc-tubo     { background:rgba(249,115,22,0.15); color:var(--orange); }
.mc-vendedor { background:rgba(234,179,8,0.15); color:var(--yellow); }
.mc-instalador { background:rgba(59,130,246,0.15); color:var(--primary-500); }
.mc-plano    { background:rgba(139,92,246,0.15); color:var(--accent); }
.mc-material { background:rgba(34,197,94,0.15); color:var(--green); }
.mc-otro     { background:rgba(255,255,255,0.1); color:var(--text-secondary); }

/* ── UTILS ── */
.spinner-sm { display:inline-block; width:16px; height:16px;
    border:2px solid rgba(255,255,255,0.2); border-top-color:#fff;
    border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }
.section-title { font-size:0.7rem; font-weight:700; letter-spacing:0.1em;
    color:var(--text-secondary); text-transform:uppercase; margin-bottom:10px; }
.empty-state { text-align:center; padding:40px 20px; color:var(--text-secondary); }
.empty-state i { font-size:2.5rem; display:block; margin-bottom:10px; opacity:0.3; }
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#1e1e2e; color:var(--text-primary); border:1px solid var(--border-glass);
    border-radius:12px; padding:11px 20px; font-size:0.85rem; font-weight:600;
    z-index:9999; transition:opacity 0.3s; opacity:0; pointer-events:none; }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="app-header">
    <div id="hdr-back" style="display:none;">
        <button class="btn-back" onclick="volverLista()">
            <i class="bi bi-chevron-left"></i>
        </button>
    </div>
    <h1 id="hdr-title"><i class="bi bi-scissors" style="color:var(--accent)"></i> Historial de Corte</h1>
</div>

<!-- ── TABS ── -->
<div class="tabs-bar">
    <button class="tab-btn active" id="tab-planes" onclick="switchTab('planes')">
        <i class="bi bi-list-ul"></i> Planes de corte
    </button>
    <button class="tab-btn" id="tab-errores" onclick="switchTab('errores')">
        <i class="bi bi-exclamation-triangle"></i> Errores registrados
    </button>
</div>

<!-- ══════════════════════════════════
     VISTA: PLANES DE CORTE
══════════════════════════════════ -->
<div id="view-planes" class="view active">
    <div id="planes-list">
        <div class="empty-state">
            <span class="spinner-sm"></span>
            <span style="margin-left:8px">Cargando planes...</span>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════
     VISTA: ERRORES REGISTRADOS
══════════════════════════════════ -->
<div id="view-errores" class="view">
    <!-- Gráfico de motivos -->
    <div class="chart-card">
        <h3><i class="bi bi-bar-chart-fill"></i> Errores por motivo</h3>
        <canvas id="chart-motivos" height="220"></canvas>
    </div>

    <!-- Tabla de errores recientes -->
    <div class="chart-card">
        <h3><i class="bi bi-clock-history"></i> Últimos errores registrados</h3>
        <div style="overflow-x:auto;">
            <table class="errores-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>OT</th>
                        <th>Código</th>
                        <th>Medida</th>
                        <th>Motivo</th>
                        <th>Reemplazo</th>
                        <th>Registrado por</th>
                    </tr>
                </thead>
                <tbody id="errores-tbody">
                    <tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text-secondary);">
                        <span class="spinner-sm"></span> Cargando...
                    </td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════
     MODAL: REGISTRAR ERROR
══════════════════════════════════ -->
<div id="modal-error" class="modal-overlay" style="display:none;" onclick="cerrarModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3>⚠️ Registrar error de corte</h3>
        <p style="font-size:0.8rem;color:var(--text-secondary);margin-top:4px;">
            El registro quedará en el historial para análisis de errores.
        </p>

        <!-- Info del corte (readonly) -->
        <div class="modal-info-row" id="modal-info-chips"></div>

        <!-- Motivo -->
        <label class="form-label-r">Motivo del error *</label>
        <select id="err-motivo" class="form-select-r">
            <option value="">— Seleccioná un motivo —</option>
            <option value="Error de corte (operario)">Error de corte (operario)</option>
            <option value="Falla en el tubo">Falla en el tubo</option>
            <option value="Error del vendedor">Error del vendedor</option>
            <option value="Error del instalador">Error del instalador</option>
            <option value="Medida incorrecta en plano">Medida incorrecta en plano</option>
            <option value="Material defectuoso">Material defectuoso</option>
            <option value="Otro">Otro</option>
        </select>

        <!-- Comentario opcional -->
        <label class="form-label-r">Comentario (opcional)</label>
        <textarea id="err-comentario" class="form-textarea-r"
            placeholder="Ej: el operario cortó 125cm en lugar de 120cm..."></textarea>

        <!-- Tubo de reemplazo -->
        <label class="form-label-r">Tubo de reemplazo usado (elegí de la colmena)</label>
        <input id="err-buscar-tubo" class="form-input-r" placeholder="Filtrar por código o colmena..."
            oninput="filtrarTubos(this.value)" style="margin-bottom:8px;"/>
        <div class="reemplazo-list" id="reemplazo-list">
            <div style="padding:14px;text-align:center;color:var(--text-secondary);font-size:0.82rem;">
                <span class="spinner-sm"></span> Cargando tubos...
            </div>
        </div>
        <div id="reemplazo-seleccionado" style="display:none;font-size:0.8rem;
            color:var(--green);margin-bottom:14px;padding:6px 10px;
            background:rgba(34,197,94,0.1);border-radius:8px;">
        </div>

        <!-- Registrado por -->
        <label class="form-label-r">Registrado por *</label>
        <input id="err-responsable" class="form-input-r" placeholder="Tu nombre"/>

        <button class="btn-confirm" onclick="confirmarError()">
            <i class="bi bi-check-circle-fill"></i> Guardar error
        </button>
        <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
    </div>
</div>

<div id="toast"></div>

<!-- ══════════════════════════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════════════════════════ -->
<script>
// ── Supabase ─────────────────────────────────────────────────────
const SUPABASE_URL      = 'https://izelewwgeamktnzkiwvl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6ZWxld3dnZWFta3Ruemtpd3ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTg3NDAsImV4cCI6MjA5MDUzNDc0MH0.86i0fBjj2721SiJhNLZ1Z2uKiLg8ydM0f3_pXr8opZw';
const EMPRESA_ID        = '67c635a5-152c-4780-a066-23f5081175a9';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Estado ────────────────────────────────────────────────────────
let _planes         = [];       // lista de planes cargados
let _erroresDB      = [];       // errores registrados
let _tubosColmena   = [];       // tubos disponibles en colmena
let _modalCorte     = null;     // corte seleccionado para registrar error
let _modalPlan      = null;     // plan al que pertenece el corte
let _reemplazoSel   = null;     // tubo elegido como reemplazo
let _erroresPorPlan = {};       // {plan_id: [errores]}
let _chartMotivos   = null;

// ── Tabs ──────────────────────────────────────────────────────────
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById(`view-${tab}`).classList.add('active');
    if (tab === 'errores') cargarVistaerrores();
}

// ── Toast ─────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, color = '#22c55e') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.borderColor = color;
    el.style.opacity = '1';
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.style.opacity = '0', 3200);
}

// ══════════════════════════════════════════════════════════════════
// CARGAR PLANES
// ══════════════════════════════════════════════════════════════════
async function cargarPlanes() {
    const cont = document.getElementById('planes-list');

    // Traer planes
    const { data: planes, error } = await sb
        .from('planes_corte')
        .select('id, fecha, resultados, ordenes')
        .eq('empresa_id', EMPRESA_ID)
        .order('fecha', { ascending: false })
        .limit(50);

    if (error) {
        cont.innerHTML = `<div class="empty-state"><i class="bi bi-exclamation-triangle"></i>
            Error cargando planes:<br><code style="font-size:0.75rem">${error.message}</code></div>`;
        return;
    }

    _planes = (planes || []).map(p => ({
        ...p,
        resultados: Array.isArray(p.resultados) ? p.resultados : tryParse(p.resultados, []),
        ordenes:    Array.isArray(p.ordenes)    ? p.ordenes    : tryParse(p.ordenes, [])
    }));

    if (!_planes.length) {
        cont.innerHTML = `<div class="empty-state"><i class="bi bi-scissors"></i>
            No hay planes de corte guardados aún.</div>`;
        return;
    }

    // Traer errores ya registrados para marcar filas
    const planIds = _planes.map(p => p.id).filter(Boolean);
    if (planIds.length) {
        const { data: errs } = await sb
            .from('errores_corte')
            .select('plan_id, linea_idx, motivo')
            .in('plan_id', planIds);
        _erroresPorPlan = {};
        (errs || []).forEach(e => {
            if (!_erroresPorPlan[e.plan_id]) _erroresPorPlan[e.plan_id] = [];
            _erroresPorPlan[e.plan_id].push(e);
        });
    }

    renderPlanes();
}

function tryParse(val, fallback) {
    try { return JSON.parse(val); } catch { return fallback; }
}

function renderPlanes() {
    const cont = document.getElementById('planes-list');
    cont.innerHTML = _planes.map((plan, pi) => {
        const fecha   = plan.fecha
            ? new Date(plan.fecha).toLocaleString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })
            : 'Fecha desconocida';
        const nCortes  = plan.resultados.length;
        const errCount = (_erroresPorPlan[plan.id] || []).length;
        const hasErrors = errCount > 0;

        return `
        <div class="plan-card${hasErrors ? ' has-errors' : ''}" id="plan-card-${pi}">
            <div class="plan-card-header" onclick="togglePlan(${pi})">
                <div>
                    <div class="plan-fecha"><i class="bi bi-scissors" style="color:var(--accent)"></i> ${fecha}</div>
                    <div class="plan-meta">${nCortes} corte${nCortes !== 1 ? 's' : ''}
                        ${hasErrors ? `&nbsp;·&nbsp;<span style="color:var(--red)">⚠️ ${errCount} error${errCount>1?'es':''}</span>` : ''}
                    </div>
                </div>
                <i class="bi bi-chevron-down plan-chevron"></i>
            </div>
            <div class="plan-body">
                ${renderTablaPlan(plan, pi)}
            </div>
        </div>`;
    }).join('');
}

// ══════════════════════════════════════════════════════════════════
// RENDERIZAR TABLA (igual al Excel)
// ══════════════════════════════════════════════════════════════════
function renderTablaPlan(plan, pi) {
    const { resultados, ordenes, id: planId } = plan;
    const erroresDePlan = _erroresPorPlan[planId] || [];

    let rows = '';
    resultados.forEach((item, idx) => {
        // Compatibilidad: resultados puede ser array de {resultado, orden} o directo
        const r   = item.resultado ?? item;
        const ord = (item.orden && typeof item.orden === 'object')
            ? item.orden
            : (ordenes.find(o => o.id === (r.orden || item.orden)) || {});

        // Datos del corte
        const ot       = ord.ot || ord.numero_ot || r.orden || '-';
        const ubicacion= ord.ubic || ord.ubicacion || '-';
        const colmena  = r.colmena ?? r.nombreMaterialNuevo ?? 'TUBO NUEVO';
        const codigo   = r.codigo || r.codigo_original || '-';
        const color    = r.color || '-';
        const medidaCm = r.medida_cm != null ? Number(r.medida_cm).toFixed(1) : '-';
        const origenCm = r.medida_origen != null ? Number(r.medida_origen).toFixed(1) : '-';

        // Serial / lote / paquete
        const s         = r.serial && typeof r.serial === 'object' ? r.serial : {};
        const lote      = s.lote      || r.lote      || '-';
        const paquete   = s.paquete   || r.paquete   || '-';
        const serial    = s.serial    || r.serial_str || '-';
        const fechaSer  = s.fecha ? new Date(s.fecha).toLocaleDateString('es-AR') : '-';

        // ¿Ya tiene error registrado?
        const errorExistente = erroresDePlan.find(e => e.linea_idx === idx);
        const btnErrorClass  = errorExistente ? 'btn-error-fila tiene-error' : 'btn-error-fila';
        const btnErrorLabel  = errorExistente ? `⚠️ ${errorExistente.motivo}` : '⚠️ Error';

        // Determinar acción
        let accion = 'CORTAR';
        if (r.es_cenefa_ovalada)       accion = 'CORTAR CENEFA OVALADA';
        else if (r.es_peso)            accion = 'CORTAR PESO';
        else if (r.codigo?.includes('TIRA')) accion = 'CORTAR CON TIRA';

        // Fila principal: CORTAR
        rows += `
        <tr class="fila-cortar">
            <td>${ot}</td>
            <td>${ubicacion}</td>
            <td><span class="tag-accion tag-cortar">${accion}</span></td>
            <td><strong>${colmena}</strong></td>
            <td>${codigo}</td>
            <td>${color}</td>
            <td style="text-align:right;font-weight:700;">${medidaCm}</td>
            <td style="text-align:right;">${origenCm}</td>
            <td>${lote}</td>
            <td>${paquete}</td>
            <td>${serial}</td>
            <td>${fechaSer}</td>
            <td>
                <button class="${btnErrorClass}"
                    onclick="abrirModalError(${pi}, ${idx})"
                    title="Registrar error en este corte">
                    ${btnErrorLabel}
                </button>
            </td>
        </tr>`;

        // Fila sobrante (si aplica)
        if (r.sobrante_cm > 0) {
            const sobranteCm = Number(r.sobrante_cm).toFixed(1);
            const colSob     = r.colmena_sobrante || colmena;

            if (r.es_intermedio) {
                rows += `
                <tr class="fila-mesa">
                    <td>${ot}</td><td>${ubicacion}</td>
                    <td><span class="tag-accion tag-mesa">RESERVAR EN MESA</span></td>
                    <td>—</td><td>${codigo}</td><td>${color}</td>
                    <td style="text-align:right;font-weight:700;">${sobranteCm}</td>
                    <td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td></td>
                </tr>`;
            } else if (r.es_desecho) {
                rows += `
                <tr class="fila-merma">
                    <td>${ot}</td><td>${ubicacion}</td>
                    <td><span class="tag-accion tag-merma">DESECHAR MERMA</span></td>
                    <td>BASURERO</td><td>${codigo}</td><td>${color}</td>
                    <td style="text-align:right;font-weight:700;">${sobranteCm}</td>
                    <td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td></td>
                </tr>`;
            } else {
                rows += `
                <tr class="fila-guardar">
                    <td>${ot}</td><td>${ubicacion}</td>
                    <td><span class="tag-accion tag-guardar">GUARDAR SOBRANTE</span></td>
                    <td>${colSob}</td><td>${codigo}</td><td>${color}</td>
                    <td style="text-align:right;font-weight:700;">${sobranteCm}</td>
                    <td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td></td>
                </tr>`;
            }
        }
    });

    return `
    <table class="tabla-plan">
        <thead>
            <tr>
                <th>OT</th>
                <th>Ubicación</th>
                <th>Acción</th>
                <th>Colmena</th>
                <th>Código</th>
                <th>Color</th>
                <th>Cortar (cm)</th>
                <th>Origen (cm)</th>
                <th>Lote</th>
                <th>Paquete</th>
                <th>Serial</th>
                <th>Fecha serial</th>
                <th></th>
            </tr>
        </thead>
        <tbody>${rows}</tbody>
    </table>`;
}

function togglePlan(pi) {
    const card = document.getElementById(`plan-card-${pi}`);
    card.classList.toggle('expanded');
}

// ══════════════════════════════════════════════════════════════════
// MODAL ERROR
// ══════════════════════════════════════════════════════════════════
async function abrirModalError(pi, idx) {
    _modalPlan  = _planes[pi];
    const item  = _modalPlan.resultados[idx];
    const r     = item?.resultado ?? item;
    const ord   = (item?.orden && typeof item.orden === 'object')
        ? item.orden
        : (_modalPlan.ordenes.find(o => o.id === (r.orden || item?.orden)) || {});

    _modalCorte = { planId: _modalPlan.id, planFecha: _modalPlan.fecha, idx, r, ord };
    _reemplazoSel = null;

    // Chips de info
    const chips = [
        { label:'OT',      val: ord.ot || ord.numero_ot || r.orden || '-' },
        { label:'Código',  val: r.codigo || r.codigo_original || '-' },
        { label:'Colmena', val: r.colmena ?? 'TUBO NUEVO' },
        { label:'Medida',  val: r.medida_cm != null ? `${Number(r.medida_cm).toFixed(1)} cm` : '-' },
        { label:'Origen',  val: r.medida_origen != null ? `${Number(r.medida_origen).toFixed(1)} cm` : '-' },
        { label:'Color',   val: r.color || '-' },
    ];
    document.getElementById('modal-info-chips').innerHTML = chips.map(c =>
        `<div class="info-chip"><strong>${c.label}</strong>${c.val}</div>`
    ).join('');

    // Reset campos
    document.getElementById('err-motivo').value = '';
    document.getElementById('err-comentario').value = '';
    document.getElementById('err-buscar-tubo').value = '';
    document.getElementById('err-responsable').value = '';
    document.getElementById('reemplazo-seleccionado').style.display = 'none';

    document.getElementById('modal-error').style.display = 'flex';

    // Cargar tubos si no los tenemos
    if (!_tubosColmena.length) await cargarTubos();
    else renderTubosList('');
}

function cerrarModal(e) {
    if (e && e.target !== document.getElementById('modal-error')) return;
    document.getElementById('modal-error').style.display = 'none';
}

async function cargarTubos() {
    const { data } = await sb
        .from('colmena_tubos')
        .select('id, n_colmena, cod, medida_cm')
        .eq('empresa_id', EMPRESA_ID)
        .order('n_colmena');
    _tubosColmena = data || [];
    renderTubosList('');
}

function filtrarTubos(q) {
    renderTubosList(q);
}

function renderTubosList(q) {
    const cont = document.getElementById('reemplazo-list');
    const filtrados = q
        ? _tubosColmena.filter(t =>
            (t.cod || '').toLowerCase().includes(q.toLowerCase()) ||
            String(t.n_colmena || '').includes(q))
        : _tubosColmena;

    if (!filtrados.length) {
        cont.innerHTML = `<div style="padding:14px;text-align:center;color:var(--text-secondary);font-size:0.82rem;">
            Sin tubos disponibles</div>`;
        return;
    }

    cont.innerHTML = filtrados.slice(0, 80).map(t => {
        const sel = _reemplazoSel?.id === t.id;
        return `
        <div class="reemplazo-item${sel ? ' selected' : ''}" onclick="seleccionarTubo('${t.id}')">
            <span><strong>Colmena ${t.n_colmena}</strong> · ${t.cod}</span>
            <span style="color:var(--text-secondary)">${t.medida_cm != null ? Number(t.medida_cm).toFixed(1)+' cm' : '-'}</span>
        </div>`;
    }).join('');
}

function seleccionarTubo(id) {
    _reemplazoSel = _tubosColmena.find(t => t.id === id) || null;
    renderTubosList(document.getElementById('err-buscar-tubo').value);

    const el = document.getElementById('reemplazo-seleccionado');
    if (_reemplazoSel) {
        el.textContent = `✅ Colmena ${_reemplazoSel.n_colmena} · ${_reemplazoSel.cod} · ${Number(_reemplazoSel.medida_cm||0).toFixed(1)} cm`;
        el.style.display = 'block';
    } else {
        el.style.display = 'none';
    }
}

async function confirmarError() {
    const motivo      = document.getElementById('err-motivo').value;
    const comentario  = document.getElementById('err-comentario').value.trim();
    const responsable = document.getElementById('err-responsable').value.trim();

    if (!motivo)      { toast('Seleccioná un motivo', '#f59e0b'); return; }
    if (!responsable) { toast('Ingresá tu nombre', '#f59e0b'); return; }
    if (!_modalCorte) return;

    const { r, ord, planId, planFecha, idx } = _modalCorte;
    const s = r.serial && typeof r.serial === 'object' ? r.serial : {};

    const payload = {
        empresa_id:           EMPRESA_ID,
        plan_id:              planId || null,
        plan_fecha:           planFecha || null,
        linea_idx:            idx,
        ot:                   ord.ot || ord.numero_ot || r.orden || null,
        ubicacion:            ord.ubic || ord.ubicacion || null,
        colmena_original:     String(r.colmena ?? ''),
        cod_original:         r.codigo || r.codigo_original || null,
        medida_cm:            r.medida_cm ?? null,
        medida_origen_cm:     r.medida_origen ?? null,
        color:                r.color || null,
        serial:               s.serial || null,
        motivo,
        comentario:           comentario || null,
        reemplazo_colmena:    _reemplazoSel ? String(_reemplazoSel.n_colmena) : null,
        reemplazo_cod:        _reemplazoSel?.cod || null,
        reemplazo_medida_cm:  _reemplazoSel?.medida_cm ?? null,
        registrado_por:       responsable
    };

    const { error } = await sb.from('errores_corte').insert(payload);
    if (error) { toast(`Error: ${error.message}`, '#ef4444'); return; }

    // Actualizar estado local
    if (planId) {
        if (!_erroresPorPlan[planId]) _erroresPorPlan[planId] = [];
        _erroresPorPlan[planId].push({ linea_idx: idx, motivo });
    }

    document.getElementById('modal-error').style.display = 'none';
    toast('✅ Error registrado correctamente');

    // Re-renderizar planes para que el botón se actualice
    renderPlanes();
    // Reabrir el plan que estaba abierto
    const pi = _planes.findIndex(p => p.id === planId);
    if (pi >= 0) document.getElementById(`plan-card-${pi}`)?.classList.add('expanded');
}

// ══════════════════════════════════════════════════════════════════
// VISTA ERRORES — Gráfico + tabla
// ══════════════════════════════════════════════════════════════════
async function cargarVistaerrores() {
    const { data: errores, error } = await sb
        .from('errores_corte')
        .select('*')
        .eq('empresa_id', EMPRESA_ID)
        .order('created_at', { ascending: false })
        .limit(200);

    if (error || !errores) return;
    _erroresDB = errores;

    renderGrafico(errores);
    renderTablaErrores(errores);
}

function renderGrafico(errores) {
    const conteo = {};
    errores.forEach(e => { conteo[e.motivo] = (conteo[e.motivo] || 0) + 1; });

    const labels  = Object.keys(conteo);
    const valores = Object.values(conteo);
    const colores = ['#ef4444','#f97316','#f59e0b','#3b82f6','#8b5cf6','#22c55e','#a1a1aa'];

    if (_chartMotivos) _chartMotivos.destroy();

    const ctx = document.getElementById('chart-motivos').getContext('2d');
    _chartMotivos = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [{
                label: 'Errores',
                data: valores,
                backgroundColor: colores.slice(0, labels.length),
                borderRadius: 6,
                borderSkipped: false
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y} error${ctx.parsed.y>1?'es':''}` } }
            },
            scales: {
                x: { ticks: { color:'#a1a1aa', font:{ size:11 } }, grid:{ color:'rgba(255,255,255,0.05)' } },
                y: { ticks: { color:'#a1a1aa', stepSize:1 }, grid:{ color:'rgba(255,255,255,0.05)' },
                     beginAtZero:true }
            }
        }
    });
}

const MOTIVO_CSS = {
    'Error de corte (operario)': 'mc-operario',
    'Falla en el tubo':          'mc-tubo',
    'Error del vendedor':        'mc-vendedor',
    'Error del instalador':      'mc-instalador',
    'Medida incorrecta en plano':'mc-plano',
    'Material defectuoso':       'mc-material',
    'Otro':                      'mc-otro'
};

function renderTablaErrores(errores) {
    const tbody = document.getElementById('errores-tbody');
    if (!errores.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state">Sin errores registrados aún.</td></tr>`;
        return;
    }
    tbody.innerHTML = errores.map(e => {
        const fecha = new Date(e.created_at).toLocaleString('es-AR', {
            day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
        const css = MOTIVO_CSS[e.motivo] || 'mc-otro';
        const reemplazo = e.reemplazo_cod
            ? `Colmena ${e.reemplazo_colmena} · ${e.reemplazo_cod} (${Number(e.reemplazo_medida_cm||0).toFixed(1)} cm)`
            : '—';
        return `
        <tr>
            <td>${fecha}</td>
            <td>${e.ot || '—'}</td>
            <td>${e.cod_original || '—'}</td>
            <td>${e.medida_cm != null ? Number(e.medida_cm).toFixed(1)+' cm' : '—'}</td>
            <td><span class="motivo-chip ${css}">${e.motivo}</span></td>
            <td>${reemplazo}</td>
            <td>${e.registrado_por || '—'}</td>
        </tr>`;
    }).join('');
}

// ── Init ─────────────────────────────────────────────────────────
cargarPlanes();
</script>
